<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchVideo</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/modals.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" id="menuBtn" title="Меню">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 90 20" fill="none">
          <rect width="28" height="20" rx="4" fill="white"/>
          <polygon points="11,5 22,10 11,15" fill="#1a1a1a"/>
        </svg>
        <span class="logo-text">WatchVideo</span>
      </a>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <input type="text" id="searchInput" class="search-input" placeholder="Search">
        <button class="search-btn" id="searchBtn" title="Поиск">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" title="Приложения">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6.5 10h-2v2h2v-2zm0 4h-2v2h2v-2zm0-8h-2v2h2V6zm4 8h-2v2h2v-2zm0-4h-2v2h2v-2zm0-4h-2v2h2V6zm4 8h-2v2h2v-2zm0-4h-2v2h2v-2zm0-4h-2v2h2V6zm4 0h-2v2h2V6zm0 8h-2v2h2v-2zm0-4h-2v2h2v-2z"/>
        </svg>
      </button>

      <!-- Кнопка загрузки — всегда видна, меняет поведение -->
      <a href="/upload.html" class="upload-btn" id="uploadBtn" title="Загрузить видео">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
        </svg>
        Загрузить
      </a>

      <!-- Не авторизован: Войти + Регистрация -->
      <div id="authButtons" class="auth-buttons">
        <button class="btn-outline" id="loginBtn">Войти</button>
        <button class="btn-primary" id="registerBtn">Регистрация</button>
      </div>

      <!-- Авторизован: аватар + дропдаун с "Выйти" -->
      <div id="userMenu" class="user-menu hidden">
        <div class="avatar-wrap" id="avatarWrap">
          <div class="user-avatar-icon" id="userAvatarIcon"></div>
          <div class="dropdown" id="userDropdown">
            <span class="dropdown-username" id="dropdownUsername"></span>
            <a class="dropdown-link" href="/upload.html">Загрузить видео</a>
            <button onclick="logout()">Выйти</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div class="video-grid" id="videoGrid"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
    <div class="no-results hidden" id="noResults">
      <p>Видео не найдено</p>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap">
      <button class="btn-outline" id="loadMoreBtn">Загрузить ещё</button>
    </div>
  </main>

  <!-- Auth Modal -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal auth-modal">
      <button class="modal-close" onclick="closeModal('authModal')">✕</button>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Войти</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Sign up</button>
      </div>
      <div id="loginForm">
        <div class="field">
          <label>E-mail или логин:</label>
          <input type="text" id="loginEmail" placeholder="Введите email или логин...">
          <span class="field-error" id="loginEmailErr"></span>
        </div>
        <div class="field">
          <label>Password:</label>
          <input type="password" id="loginPassword" placeholder="">
          <span class="field-error" id="loginPasswordErr"></span>
        </div>
        <span class="field-error" id="loginGlobalErr"></span>
        <button class="btn-red full-width" onclick="doLogin()">Sign In</button>
      </div>
      <div id="registerForm" class="hidden">
        <div class="field">
          <label>E-mail:</label>
          <input type="email" id="regEmail" placeholder="Enter your e-mail...">
          <span class="field-error" id="regEmailErr"></span>
        </div>
        <div class="field">
          <label>Username:</label>
          <input type="text" id="regUsername" placeholder="Enter your name...">
          <span class="field-error" id="regUsernameErr"></span>
        </div>
        <div class="field">
          <label>Password:</label>
          <input type="password" id="regPassword" placeholder="">
          <span class="field-error" id="regPasswordErr"></span>
        </div>
        <div class="field">
          <label>Confirm Password:</label>
          <input type="password" id="regConfirm" placeholder="">
          <span class="field-error" id="regConfirmErr"></span>
        </div>
        <span class="field-error" id="regGlobalErr"></span>
        <button class="btn-red full-width" onclick="doRegister()">Sign Up</button>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
